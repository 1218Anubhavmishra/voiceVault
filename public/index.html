<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>voiceVault</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="app">
      <header class="topbar">
        <div>
          <div class="brand">voiceVault</div>
          <div class="subtle">Record • Replay • Store • Search across all notes</div>
        </div>
        <div class="status" id="status"></div>
      </header>

      <main class="grid" id="mainGrid">
        <div class="leftCol" id="leftCol">
          <section class="card" id="newNoteCard">
            <div class="cardHeaderRow">
              <h2 style="margin:0">New note</h2>
              <button id="btnNewNoteToggle" class="btn" type="button">x</button>
            </div>

            <div id="newNoteBody">

          <label class="label">
            Title
            <input id="title" class="input" placeholder="Optional (otherwise auto from transcript)" />
          </label>

          <div class="row">
            <button id="btnRecordNote" class="btn primary">Record note</button>
            <button id="btnRecordNoteFast" class="btn primary">Record with fast mode</button>
            <button id="btnStopNote" class="btn" disabled hidden>Stop</button>
            <span class="pill timerPill" id="noteTimer" hidden>00:00</span>
            <span class="pill timerPill" id="noteDetectedLang" hidden>Lang: —</span>
          </div>

          <label class="label" id="liveTranscriptWrap" hidden>
            Transcript preview (editable)
            <span id="liveTxStatus" class="pill" style="margin-left:10px" hidden>Processing…</span>
            <div class="row" style="margin-top:8px">
              <button id="liveTxUp" class="btn">Scroll up</button>
              <button id="liveTxDown" class="btn">Scroll down</button>
            </div>
            <textarea id="liveTranscript" class="textarea" rows="6"></textarea>
          </label>

          <label class="label">
            Upload audio (optional)
            <input id="uploadNote" class="input" type="file" accept="audio/*" hidden />
            <div class="row" style="margin-top:8px">
              <button id="uploadNoteBtn" class="btn">Choose file</button>
              <span id="uploadNoteName" class="pill" style="max-width:65ch; overflow:hidden; text-overflow:ellipsis; white-space:nowrap">
                No file selected
              </span>
            </div>
          </label>

          <label class="label">
            Language (Auto-detect by default)
            <select
              id="noteLanguage"
              class="input"
              style="background: rgba(255, 255, 255, 0.95); color: rgba(0, 0, 0, 0.92); border-color: rgba(255, 255, 255, 0.75)"
            >
              <option value="">Auto-detect</option>
              <option value="en">English (en)</option>
              <option value="hi">Hindi (hi)</option>
              <option value="es">Spanish (es)</option>
              <option value="fr">French (fr)</option>
              <option value="de">German (de)</option>
              <option value="it">Italian (it)</option>
              <option value="pt">Portuguese (pt)</option>
              <option value="ja">Japanese (ja)</option>
              <option value="ko">Korean (ko)</option>
              <option value="zh">Chinese (zh)</option>
            </select>
          </label>

          <label class="label">
            <span style="display:flex; align-items:center; gap:10px; flex-wrap:wrap">
              <button id="fastModeDot" class="dotToggle isOn" type="button" aria-pressed="true" aria-label="Toggle fast mode"></button>
              <span class="toggleText">Fast mode</span>
              <span style="color: rgba(255, 255, 255, 0.72)">Faster transcription (slightly lower accuracy)</span>
            </span>
          </label>

          <div class="row">
            <button id="btnSaveNote" class="btn" disabled hidden>Save</button>
          </div>

          <div class="row">
            <audio id="previewNote" controls class="audio" hidden></audio>
          </div>

            </div>
          </section>

          <div class="sideWindows" id="sideWindows">
            <section class="card miniCard" id="processCard">
              <div class="cardHeaderRow">
                <h2 style="margin:0; font-size:14px">Processes</h2>
                <button id="btnProcToggle" class="btn" type="button">Hide</button>
              </div>
              <div id="procBody">
                <div class="jobsRow">
                  <span class="pill" id="jobsPausedPill" hidden>Paused</span>
                  <button id="btnIngestPause" class="btn err" type="button">Pause</button>
                  <button id="btnIngestResume" class="btn" type="button" hidden>Resume</button>
                </div>
                <div class="jobsSummary" id="jobsSummary" hidden></div>
                <div class="jobsFilters" id="jobsFilters" hidden>
                  <select id="jobsStatusFilter" class="jobsSelect">
                    <option value="">All statuses</option>
                    <option value="queued">Queued</option>
                    <option value="running">Running</option>
                    <option value="done">Done</option>
                    <option value="error">Error</option>
                    <option value="cancelled">Cancelled</option>
                  </select>
                  <label class="label" style="margin:0; display:flex; align-items:center; gap:10px">
                    <span style="font-size:12px; color:rgba(255,255,255,0.72); font-weight:750">Backoff base (sec)</span>
                    <input
                      id="jobsBackoffBaseSec"
                      class="input"
                      style="width:96px; padding:8px 10px"
                      type="number"
                      min="1"
                      max="60"
                      value="5"
                    />
                  </label>
                  <label class="label" style="margin:0; display:flex; align-items:center; gap:10px">
                    <span style="font-size:12px; color:rgba(255,255,255,0.72); font-weight:750">Backoff max (sec)</span>
                    <input
                      id="jobsBackoffMaxSec"
                      class="input"
                      style="width:110px; padding:8px 10px"
                      type="number"
                      min="5"
                      max="3600"
                      value="300"
                    />
                  </label>
                  <label class="label" style="margin:0; display:flex; align-items:center; gap:10px">
                    <span style="font-size:12px; color:rgba(255,255,255,0.72); font-weight:750">Max parallel</span>
                    <input
                      id="jobsMaxParallel"
                      class="input"
                      style="width:90px; padding:8px 10px"
                      type="number"
                      min="1"
                      max="6"
                      value="1"
                    />
                  </label>
                  <button id="btnJobsApply" class="btn" type="button">Apply</button>
                  <button id="btnJobsRetryAll" class="btn" type="button">Retry all errors</button>
                  <button id="btnJobsUnlockNow" class="btn err" type="button">Unlock stale</button>
                </div>
                <div class="jobsList" id="jobsList" hidden></div>
              </div>
            </section>

            <section class="card miniCard" id="helpCard">
              <div class="cardHeaderRow">
                <h2 style="margin:0; font-size:14px">Help</h2>
              </div>
              <div id="helpBody">
                <div class="row helpButtonsRow" style="margin-bottom:0">
                  <button class="btn" id="aboutToggle" type="button">App hint</button>
                  <button class="btn" id="uiStepsToggle" type="button">UI steps</button>
                </div>
                <div id="aboutBox" style="margin-top:10px" hidden></div>
                <div id="uiStepsBox" style="margin-top:10px" hidden></div>
              </div>
            </section>
          </div>
        </div>

        <section class="card" id="searchCard">
          <h2>Search</h2>
          <div class="row">
            <input id="q" class="input" placeholder="Transcript of your search audio will appear here…" />
          </div>
          <div class="row">
            <button id="btnRecordQuery" class="btn primary">Record search</button>
            <button id="btnStopQuery" class="btn" disabled hidden>Stop</button>
            <button id="btnSearch" class="btn" disabled hidden>Search</button>
            <span class="pill timerPill" id="queryTimer" hidden>00:00</span>
          </div>
          <div class="row">
            <audio id="previewQuery" controls class="audio" hidden></audio>
          </div>
          <div id="results" class="results"></div>
        </section>
      </main>
    </div>

    <div id="jobDetailsOverlay" class="overlay" hidden>
      <div class="dialog">
        <div style="display:flex; align-items:center; justify-content:space-between; gap:12px">
          <div style="font-weight:850">Job details</div>
          <button id="btnJobDetailsClose" class="btn" type="button">Close</button>
        </div>
        <pre id="jobDetailsPre" class="preBox"></pre>
        <div style="display:flex; gap:10px; justify-content:flex-end">
          <button id="btnJobDetailsCopy" class="btn" type="button">Copy</button>
        </div>
      </div>
    </div>

    <!-- Removed: advanced library meta (folders/tags) management UI -->

    <script type="module" src="/main.js"></script>
  </body>
</html>
